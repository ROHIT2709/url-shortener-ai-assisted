spring.application.name=url-shortner
server.port=${SERVER_PORT:8080}

# --- Datasource ---
# Every value reads an environment variable first and falls back to the H2
# in-memory default for local dev. Docker/prod injects the Postgres values
# (see docker-compose.yml) without touching this file.
spring.datasource.url=${DB_URL:jdbc:h2:mem:urlshortener;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2

# --- API documentation (springdoc-openapi) ---
# Easy access path: http://localhost:8080/docs  (raw spec at /v3/api-docs)
springdoc.swagger-ui.path=/docs
springdoc.swagger-ui.operations-sorter=method

# --- Application settings ---
# base-url follows server.port unless APP_BASE_URL is set explicitly
app.base-url=${APP_BASE_URL:http://localhost:${server.port}}
app.default-expiry-days=${APP_DEFAULT_EXPIRY_DAYS:30}
